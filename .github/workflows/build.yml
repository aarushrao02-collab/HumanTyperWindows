name: Build HumanTyper

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build-win
      - uses: actions/upload-artifact@v4
        with:
          name: HumanTyper-Windows
          path: dist/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build-mac
      - uses: actions/upload-artifact@v4
        with:
          name: HumanTyper-Mac
          path: dist/*.dmg
