<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Human Typer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e11;
      --surface: #17171c;
      --border: #2a2a35;
      --accent: #c8f04a;
      --accent-dim: #9db83a;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --danger: #ff5f5f;
      --radius: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* Custom titlebar */
    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      -webkit-app-region: drag;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .titlebar-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .titlebar-controls {
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    .titlebar-btn {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.15s;
    }
    .titlebar-btn:hover { background: var(--border); color: var(--text); }
    .titlebar-btn.close:hover { background: var(--danger); color: white; border-color: var(--danger); }

    /* Main content */
    .content {
      flex: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow: hidden;
    }

    .label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    textarea {
      width: 100%;
      height: 160px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      line-height: 1.6;
      padding: 12px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      user-select: text;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    .row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .field {
      flex: 1;
    }

    input[type="number"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 18px;
      font-weight: 500;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s;
      user-select: text;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type="number"]:focus { border-color: var(--accent); }

    /* Toggle switch for typos */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
    }

    .toggle-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .toggle-sub {
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    .switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }
    .switch input { display: none; }
    .slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider:before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: var(--accent); }
    input:checked + .slider:before { transform: translateX(18px); }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 10px;
    }

    button.primary {
      flex: 1;
      padding: 13px;
      background: var(--accent);
      color: #0e0e11;
      border: none;
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }
    button.primary:hover { background: #d8ff52; transform: translateY(-1px); }
    button.primary:active { transform: translateY(0); }
    button.primary:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }

    button.secondary {
      padding: 13px 18px;
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
      width: 100%;
    }
    button.secondary:hover { background: var(--danger); color: white; }
    button.secondary:disabled { opacity: 0.3; cursor: not-allowed; }

    .stop-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 38%;
    }

    button.resume {
      padding: 10px;
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    button.resume:hover { background: var(--accent); color: #0e0e11; }

    /* Status + Progress */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      display: inline-block;
      margin-right: 7px;
      transition: background 0.3s;
    }
    .status-dot.active {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text {
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      display: flex;
      align-items: center;
    }

    .status-count {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
    }

    .progress-track {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .hotkey-hint {
      text-align: center;
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      padding-bottom: 4px;
    }

    kbd {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 10px;
    }
  </style>
</head>
<body>

  <div class="titlebar">
    <span class="titlebar-title">⌨ Human Typer</span>
    <div class="titlebar-controls">
      <button class="titlebar-btn" id="minimizeBtn">−</button>
      <button class="titlebar-btn close" id="closeBtn">×</button>
    </div>
  </div>

  <div class="content">

    <div>
      <div class="label">Text to type</div>
      <textarea id="textInput" placeholder="Paste your text here..."></textarea>
    </div>

    <div class="row">
      <div class="field">
        <div class="label">Speed (WPM)</div>
        <input type="number" id="wpm" value="60" min="10" max="300">
      </div>
      <div class="field">
        <div class="label">Delay before start (sec)</div>
        <input type="number" id="delay" value="3" min="1" max="10">
      </div>
    </div>

    <div class="toggle-row">
      <div>
        <div class="toggle-label">Random Typos</div>
        <div class="toggle-sub">~3% chance, auto-corrected</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="typos" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="btn-row">
      <button class="primary" id="startBtn">▶ Start Typing</button>
      <div class="stop-group">
        <button class="secondary" id="stopBtn" disabled>■ Stop</button>
        <button class="resume" id="resumeBtn" style="display:none">▶ Resume</button>
      </div>
    </div>

    <div>
      <div class="status-row">
        <div class="status-text">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Ready</span>
        </div>
        <div class="status-count" id="countText"></div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="hotkey-hint">
      Emergency stop: <kbd>Ctrl+Shift+S</kbd> from anywhere
    </div>

  </div>

  <script src="renderer.js"></script>
</body>
</html>
